<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Delirium — Non-BlocNote</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#header{padding:12px 16px;background:#16213e;border-bottom:1px solid #0f3460;display:flex;align-items:center;gap:12px}
#header h1{font-size:18px;color:#00d4ff;flex:1}
#h-bar{width:60px;height:8px;background:#333;border-radius:4px;overflow:hidden}
#h-fill{height:100%;width:50%;background:linear-gradient(90deg,#4a90d9,#00d4ff);border-radius:4px;transition:width .5s}
#h-label{font-size:11px;color:#666;min-width:50px;text-align:right}
#status{width:10px;height:10px;border-radius:50%;background:#444}
#status.connected{background:#0f0}
#status.disconnected{background:#f00}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;line-height:1.5;font-size:15px;word-wrap:break-word;animation:fadeIn .3s}
.msg.user{align-self:flex-end;background:#0f3460;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#16213e;color:#00d4ff;border-bottom-left-radius:4px;border:1px solid #0f3460}
.msg.system{align-self:center;background:transparent;color:#666;font-size:12px;font-style:italic}
.msg.streaming{opacity:.9}
#input-area{padding:12px 16px;background:#16213e;border-top:1px solid #0f3460;display:flex;gap:8px}
#input{flex:1;padding:10px 14px;border:1px solid #0f3460;border-radius:20px;background:#1a1a2e;color:#e0e0e0;font-size:15px;outline:none;resize:none;max-height:100px}
#input:focus{border-color:#00d4ff}
#send{padding:10px 18px;background:#0f3460;color:#00d4ff;border:none;border-radius:20px;font-size:15px;cursor:pointer;font-weight:600}
#send:hover{background:#00d4ff;color:#1a1a2e}
#send:disabled{opacity:.4;cursor:not-allowed}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:600px){.msg{max-width:90%}#header h1{font-size:16px}}
</style>
</head>
<body>
<div id="header">
  <h1>Delirium</h1>
  <div id="h-bar"><div id="h-fill"></div></div>
  <span id="h-label">neutre</span>
  <div id="status" class="disconnected"></div>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Dis ce que tu veux..." autocomplete="off"></textarea>
  <button id="send">→</button>
</div>

<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const status = document.getElementById('status');
const hFill = document.getElementById('h-fill');
const hLabel = document.getElementById('h-label');

let ws = null;
let streaming = null;
let sessionId = localStorage.getItem('delirium_session') || null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws${sessionId ? '?session_id=' + sessionId : ''}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    status.className = 'connected';
    if (!sessionId) addMsg('system', 'Connecté. Delirium t\'attend.');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem('delirium_session', sessionId);
      }
      if (data.type === 'token') {
        if (!streaming) {
          streaming = addMsg('assistant', '', true);
        }
        streaming.textContent += data.content;
        msgs.scrollTop = msgs.scrollHeight;
      } else if (data.type === 'done' || data.response) {
        if (streaming) {
          streaming.classList.remove('streaming');
          if (data.response && !streaming.textContent) {
            streaming.textContent = data.response;
          }
          streaming = null;
        } else if (data.response) {
          addMsg('assistant', data.response);
        }
        sendBtn.disabled = false;
        if (data.h_value !== undefined) updateH(data.h_value);
      } else if (data.type === 'error') {
        addMsg('system', data.message || 'Erreur');
        sendBtn.disabled = false;
      }
    } catch {
      // Plain text response
      if (streaming) {
        streaming.textContent += e.data;
      } else {
        addMsg('assistant', e.data);
      }
    }
  };

  ws.onclose = () => {
    status.className = 'disconnected';
    streaming = null;
    sendBtn.disabled = false;
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function addMsg(role, text, isStreaming = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}${isStreaming ? ' streaming' : ''}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ message: text }));
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
}

function updateH(h) {
  const pct = ((h + 1) / 2) * 100;
  hFill.style.width = pct + '%';
  if (h < -0.5) { hLabel.textContent = 'retenu'; hFill.style.background = '#4a90d9'; }
  else if (h < 0.2) { hLabel.textContent = 'neutre'; hFill.style.background = 'linear-gradient(90deg,#4a90d9,#00d4ff)'; }
  else { hLabel.textContent = 'audacieux'; hFill.style.background = '#00d4ff'; }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});

connect();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
</body>
</html>
